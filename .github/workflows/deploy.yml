name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: deploy-dwg
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 173.212.246.41 >> ~/.ssh/known_hosts
      - name: Rsync to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' --exclude='.venv' --exclude='__pycache__' --exclude='.github' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ root@173.212.246.41:/var/www/dwg/
      - name: Install + restart
        run: |
          ssh -i ~/.ssh/id_ed25519 root@173.212.246.41 'cd /var/www/dwg && .venv/bin/pip install -r requirements.txt && pm2 restart dwg && pm2 save'
